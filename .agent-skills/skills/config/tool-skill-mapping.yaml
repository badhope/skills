# Tool to Skill Mapping Configuration
# Version: 3.1
# Description: Defines the mapping between MCP tools and Skill capabilities

version: "3.1"
description: "Tool-Skill Mapping for Mega-Agent Architecture"

# Tool Category Definitions
tool_categories:
  - id: "filesystem"
    name: "File System"
    description: "File and directory operations"
    tools:
      - "fs_read_file"
      - "fs_write_file"
      - "fs_list_directory"
      - "fs_mkdir"
      - "fs_delete_file"
      - "fs_copy_file"
      - "fs_append_file"
      - "fs_find_files"
      - "fs_read_file"
      - "fs_write_file"
      - "fs_mkdir"
      - "fs_list"
      - "fs_delete"
      - "fs_copy"

  - id: "terminal"
    name: "Terminal"
    description: "Command execution and shell operations"
    tools:
      - "run_shell"
      - "npm_run"
      - "run_tests"
      - "check_node_version"
      - "list_scripts"
      - "terminal_exec"

  - id: "npm"
    name: "NPM"
    description: "Node Package Manager operations"
    tools:
      - "npm_init"
      - "npm_install"
      - "npm_run"

  - id: "git"
    name: "Version Control"
    description: "Git operations and version control"
    tools:
      - "git_clone"
      - "git_commit"
      - "git_push"
      - "git_pull"
      - "git_checkout"
      - "git_merge"
      - "git_log"
      - "git_status"
      - "git_diff"
      - "git_init"
      - "git_add"

  - id: "database"
    name: "Database"
    description: "Database operations"
    tools:
      - "db_query"
      - "db_execute"
      - "db_migrate"
      - "db_connect"
      - "db_backup"

  - id: "search"
    name: "Search"
    description: "Search and information retrieval"
    tools:
      - "web_search"
      - "code_search"
      - "document_search"
      - "knowledge_search"
      - "search"
      - "code_search"
      - "web_crawl"

  - id: "docker"
    name: "Containerization"
    description: "Docker and container operations"
    tools:
      - "docker_build"
      - "docker_run"
      - "docker_compose"
      - "docker_push"
      - "docker_pull"
      - "docker_compose_up"
      - "docker_compose_down"

  - id: "kubernetes"
    name: "Orchestration"
    description: "Kubernetes operations"
    tools:
      - "kubectl_apply"
      - "kubectl_get"
      - "kubectl_delete"
      - "helm_install"
      - "helm_upgrade"

  - id: "testing"
    name: "Testing"
    description: "Test execution and quality assurance"
    tools:
      - "run_tests"
      - "test_generate"
      - "code_coverage"
      - "performance_test"
      - "test_run"
      - "test_coverage"

  - id: "code"
    name: "Code Tools"
    description: "Code analysis and manipulation"
    tools:
      - "code_review"
      - "code_generate"
      - "code_refactor"
      - "code_format"
      - "code_lint"

  - id: "security"
    name: "Security"
    description: "Security scanning and auditing"
    tools:
      - "security_scan"
      - "dependency_check"
      - "secret_scan"
      - "vulnerability_scan"

  - id: "cloud"
    name: "Cloud"
    description: "Cloud provider operations"
    tools:
      - "aws_deploy"
      - "gcp_deploy"
      - "azure_deploy"
      - "vercel_deploy"
      - "netlify_deploy"

  - id: "network"
    name: "Network"
    description: "Network operations"
    tools:
      - "ping"
      - "curl"
      - "dns_lookup"
      - "port_scan"

  - id: "browser"
    name: "Browser Automation"
    description: "Browser automation and web interaction"
    tools:
      - "browser_open"
      - "browser_click"
      - "browser_screenshot"
      - "browser_fill"
      - "browser_evaluate"

  - id: "data"
    name: "Data Processing"
    description: "Data transformation and processing"
    tools:
      - "csv_read"
      - "csv_write"
      - "json_parse"
      - "json_format"
      - "data_transform"

  - id: "markdown"
    name: "Markdown"
    description: "Markdown processing"
    tools:
      - "md_render"
      - "md_toc"
      - "md_validate"

  - id: "monitoring"
    name: "Monitoring"
    description: "System monitoring and metrics"
    tools:
      - "monitor_metrics"
      - "monitor_alerts"
      - "monitor_logs"

  - id: "env"
    name: "Environment"
    description: "Environment variable management"
    tools:
      - "env_read"
      - "env_set"
      - "env_list"

  - id: "secrets"
    name: "Secrets"
    description: "Secrets management"
    tools:
      - "secrets_read"
      - "secrets_write"
      - "secrets_delete"

  - id: "thinking"
    name: "Thinking"
    description: "Complex reasoning"
    tools:
      - "thinking"
      - "analyze"
      - "plan"
      - "reflect"

  - id: "memory"
    name: "Memory"
    description: "Memory and knowledge management"
    tools:
      - "memory_save"
      - "memory_recall"
      - "memory_search"

  - id: "rag"
    name: "RAG"
    description: "Retrieval augmented generation"
    tools:
      - "rag_search"
      - "rag_index"
      - "rag_retrieve"

  - id: "diff"
    name: "Diff"
    description: "File comparison"
    tools:
      - "diff_compare"

  - id: "json"
    name: "JSON"
    description: "JSON processing"
    tools:
      - "json_parse"
      - "json_format"

  - id: "csv"
    name: "CSV"
    description: "CSV processing"
    tools:
      - "csv_read"
      - "csv_write"

  - id: "web"
    name: "Web"
    description: "Web operations"
    tools:
      - "web_crawl"

# Skill to Tool Mapping
skill_tool_mapping:
  # Meta Skills
  task-planner:
    required_tools:
      - "thinking"
      - "search"
    recommended_tools:
      - "memory"
      - "filesystem"
      - "web_search"

  skill-crafter:
    required_tools:
      - "filesystem"
      - "terminal"
    recommended_tools:
      - "code_generate"
      - "code_format"
      - "search"

  orchestrator:
    required_tools:
      - "thinking"
      - "message_bus"
    recommended_tools:
      - "memory"
      - "task_planner"

  reflector:
    required_tools:
      - "thinking"
      - "memory"
    recommended_tools:
      - "search"
      - "analysis"

  continuous-learning:
    required_tools:
      - "web_search"
      - "knowledge_search"
    recommended_tools:
      - "memory"
      - "document_search"

  # Engine Skills
  fullstack-engine:
    required_tools:
      - "filesystem"
      - "terminal"
      - "git"
    recommended_tools:
      - "database"
      - "docker"
      - "code_generate"
      - "testing"
      - "search"
      - "json"
      - "env"

  frontend-master:
    required_tools:
      - "filesystem"
      - "terminal"
    recommended_tools:
      - "code_generate"
      - "code_format"
      - "testing"
      - "search"
      - "browser"

  backend-master:
    required_tools:
      - "filesystem"
      - "terminal"
      - "database"
    recommended_tools:
      - "git"
      - "docker"
      - "code_generate"
      - "testing"
      - "env"

  database-specialist:
    required_tools:
      - "database"
      - "terminal"
    recommended_tools:
      - "filesystem"
      - "search"
      - "testing"

  devops-engineer:
    required_tools:
      - "terminal"
      - "docker"
      - "git"
    recommended_tools:
      - "kubernetes"
      - "cloud"
      - "network"
      - "monitoring"
      - "env"

  security-auditor:
    required_tools:
      - "security_scan"
      - "filesystem"
    recommended_tools:
      - "dependency_check"
      - "secret_scan"
      - "code_review"

  bug-hunter:
    required_tools:
      - "filesystem"
      - "terminal"
    recommended_tools:
      - "testing"
      - "search"
      - "code_review"
      - "log_analysis"

  code-quality-expert:
    required_tools:
      - "code_review"
      - "code_lint"
    recommended_tools:
      - "code_format"
      - "testing"
      - "search"

  ai-agent-architect:
    required_tools:
      - "filesystem"
      - "search"
    recommended_tools:
      - "code_generate"

# Fallback Strategies
fallback_strategies:
  filesystem:
    - "terminal"
    - "browser"
  terminal:
    - "filesystem"
  git:
    - "terminal"
  database:
    - "terminal"
    - "filesystem"
  search:
    - "web_search"
    - "code_search"
  docker:
    - "terminal"
  testing:
    - "terminal"
    - "code_lint"
  code:
    - "terminal"
  security:
    - "code_review"
    - "search"

# Platform Adapters
platform_adapters:
  trae:
    prefix: "trae_"
    tool_mapping: {}

  claude:
    prefix: ""
    tool_mapping: {}

  doubao:
    prefix: "db_"
    tool_mapping:
      "fs_read_file": "file_read"
      "fs_write_file": "file_write"
      "terminal_exec": "execute_command"

  cursor:
    prefix: ""
    tool_mapping: {}

  windsurf:
    prefix: ""
    tool_mapping: {}

# Capability Matrix
capability_matrix:
  - capability: "code_generation"
    description: "Generate code from specifications"
    tools:
      - "code_generate"
      - "filesystem"
    skills:
      - "fullstack-engine"
      - "frontend-master"
      - "backend-master"

  - capability: "code_analysis"
    description: "Analyze and review code quality"
    tools:
      - "code_review"
      - "code_lint"
    skills:
      - "code-quality-expert"
      - "security-auditor"

  - capability: "testing"
    description: "Run tests and generate test cases"
    tools:
      - "test_run"
      - "test_generate"
      - "test_coverage"
    skills:
      - "testing-master"

  - capability: "deployment"
    description: "Deploy applications to various platforms"
    tools:
      - "docker_build"
      - "docker_run"
      - "cloud_deploy"
    skills:
      - "devops-engineer"

  - capability: "security"
    description: "Security scanning and auditing"
    tools:
      - "security_scan"
      - "secret_scan"
      - "dependency_check"
    skills:
      - "security-auditor"

  - capability: "knowledge_retrieval"
    description: "Retrieve information from knowledge sources"
    tools:
      - "rag_search"
      - "memory_recall"
      - "web_search"
    skills:
      - "task-planner"

  - capability: "data_processing"
    description: "Process and transform data"
    tools:
      - "csv_read"
      - "csv_write"
      - "json_parse"
    skills:
      - "fullstack-engine"

  - capability: "version_control"
    description: "Manage code versions"
    tools:
      - "git_commit"
      - "git_push"
      - "git_pull"
    skills:
      - "fullstack-engine"
      - "devops-engineer"

  - capability: "database_operations"
    description: "Perform database operations"
    tools:
      - "db_query"
      - "db_migrate"
    skills:
      - "database-specialist"
      - "backend-master"

  - capability: "environment_management"
    description: "Manage environment configurations"
    tools:
      - "env_read"
      - "env_set"
      - "secrets_read"
    skills:
      - "devops-engineer"

  - capability: "planning"
    description: "Plan tasks and workflows"
    tools:
      - "thinking"
      - "plan"
    skills:
      - "task-planner"

  - capability: "reflection"
    description: "Reflect on execution and improve"
    tools:
      - "reflect"
      - "memory"
    skills:
      - "reflector"

  - capability: "monitoring"
    description: "Monitor system status"
    tools:
      - "monitor_metrics"
      - "monitor_alerts"
    skills:
      - "devops-engineer"

  - capability: "browser_automation"
    description: "Automate browser interactions"
    tools:
      - "browser_open"
      - "browser_click"
    skills:
      - "frontend-master"

  - capability: "networking"
    description: "Network operations"
    tools:
      - "curl"
      - "ping"
    skills:
      - "devops-engineer"
