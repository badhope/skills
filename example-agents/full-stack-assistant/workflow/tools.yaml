version: "1.0.0"
tools:
  # File System Tools
  - id: "fs-read-file"
    name: "Read File"
    description: "Read contents of a file"
    category: "filesystem"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to the file to read"

  - id: "fs-write-file"
    name: "Write File"
    description: "Write content to a file"
    category: "filesystem"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to the file to write"
      - name: "content"
        type: "string"
        required: true
        description: "Content to write to the file"
      - name: "append"
        type: "boolean"
        required: false
        description: "Whether to append to existing content"

  - id: "fs-mkdir"
    name: "Create Directory"
    description: "Create a new directory"
    category: "filesystem"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path of the directory to create"

  - id: "fs-list"
    name: "List Directory"
    description: "List contents of a directory"
    category: "filesystem"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to list (defaults to current directory)"

  - id: "fs-delete"
    name: "Delete File/Directory"
    description: "Delete a file or directory"
    category: "filesystem"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to delete"
      - name: "recursive"
        type: "boolean"
        required: false
        description: "Whether to delete recursively for directories"

  - id: "fs-copy"
    name: "Copy File/Directory"
    description: "Copy a file or directory"
    category: "filesystem"
    parameters:
      - name: "source"
        type: "string"
        required: true
        description: "Source path"
      - name: "destination"
        type: "string"
        required: true
        description: "Destination path"

  # Terminal Tools
  - id: "terminal-exec"
    name: "Execute Command"
    description: "Execute a terminal command"
    category: "terminal"
    parameters:
      - name: "command"
        type: "string"
        required: true
        description: "Command to execute"
      - name: "cwd"
        type: "string"
        required: false
        description: "Working directory for the command"
      - name: "blocking"
        type: "boolean"
        required: false
        description: "Wait for command to complete"

  - id: "npm-init"
    name: "NPM Initialize"
    description: "Initialize npm project"
    category: "npm"
    parameters:
      - name: "yes"
        type: "boolean"
        required: false
        description: "Use default values"

  - id: "npm-install"
    name: "NPM Install"
    description: "Install npm dependencies"
    category: "npm"
    parameters:
      - name: "packages"
        type: "string"
        required: false
        description: "Packages to install"
      - name: "save-dev"
        type: "boolean"
        required: false
        description: "Install as dev dependency"

  - id: "npm-run"
    name: "NPM Run Script"
    description: "Run npm script"
    category: "npm"
    parameters:
      - name: "script"
        type: "string"
        required: true
        description: "Script name to run"

  # Git Tools
  - id: "git-init"
    name: "Initialize Git Repository"
    description: "Initialize a new git repository"
    category: "git"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to initialize repository"

  - id: "git-add"
    name: "Git Add"
    description: "Add files to git staging"
    category: "git"
    parameters:
      - name: "files"
        type: "string"
        required: false
        description: "Files to add (default: all)"

  - id: "git-commit"
    name: "Git Commit"
    description: "Commit changes to git repository"
    category: "git"
    parameters:
      - name: "message"
        type: "string"
        required: true
        description: "Commit message"

  - id: "git-push"
    name: "Git Push"
    description: "Push commits to remote"
    category: "git"
    parameters:
      - name: "remote"
        type: "string"
        required: false
        description: "Remote name"
      - name: "branch"
        type: "string"
        required: false
        description: "Branch name"

  - id: "git-pull"
    name: "Git Pull"
    description: "Pull changes from remote"
    category: "git"
    parameters:
      - name: "remote"
        type: "string"
        required: false
        description: "Remote name"
      - name: "branch"
        type: "string"
        required: false
        description: "Branch name"

  - id: "git-status"
    name: "Git Status"
    description: "Show git status"
    category: "git"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to check status"

  - id: "git-log"
    name: "Git Log"
    description: "Show git commit log"
    category: "git"
    parameters:
      - name: "limit"
        type: "number"
        required: false
        description: "Number of commits to show"

  - id: "git-diff"
    name: "Git Diff"
    description: "Show git diff"
    category: "git"
    parameters:
      - name: "file"
        type: "string"
        required: false
        description: "File to diff"

  # Docker Tools
  - id: "docker-build"
    name: "Docker Build"
    description: "Build Docker image"
    category: "docker"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to Dockerfile"
      - name: "tag"
        type: "string"
        required: true
        description: "Image tag"

  - id: "docker-run"
    name: "Docker Run"
    description: "Run Docker container"
    category: "docker"
    parameters:
      - name: "image"
        type: "string"
        required: true
        description: "Image name"
      - name: "detach"
        type: "boolean"
        required: false
        description: "Run in detached mode"
      - name: "ports"
        type: "string"
        required: false
        description: "Port mappings"

  - id: "docker-compose-up"
    name: "Docker Compose Up"
    description: "Start docker-compose services"
    category: "docker"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to docker-compose.yml"
      - name: "detach"
        type: "boolean"
        required: false
        description: "Run in detached mode"

  - id: "docker-compose-down"
    name: "Docker Compose Down"
    description: "Stop docker-compose services"
    category: "docker"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to docker-compose.yml"

  # Search Tools
  - id: "search"
    name: "General Search"
    description: "Search for information"
    category: "search"
    parameters:
      - name: "query"
        type: "string"
        required: true
        description: "Search query"
      - name: "limit"
        type: "number"
        required: false
        description: "Maximum results"

  - id: "web-search"
    name: "Web Search"
    description: "Search the web for information"
    category: "search"
    parameters:
      - name: "query"
        type: "string"
        required: true
        description: "Search query"
      - name: "limit"
        type: "number"
        required: false
        description: "Maximum results"

  - id: "code-search"
    name: "Code Search"
    description: "Search code files"
    category: "search"
    parameters:
      - name: "query"
        type: "string"
        required: true
        description: "Search query"
      - name: "path"
        type: "string"
        required: false
        description: "Path to search in"

  # Code Review Tools
  - id: "code-review"
    name: "Code Review"
    description: "Perform static code analysis"
    category: "code"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to code to review"
      - name: "rules"
        type: "string"
        required: false
        description: "Review rules to apply"

  - id: "code-lint"
    name: "Code Lint"
    description: "Lint code for errors"
    category: "code"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to code to lint"
      - name: "linter"
        type: "string"
        required: false
        description: "Linter to use"

  - id: "code-format"
    name: "Code Format"
    description: "Format code files"
    category: "code"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to code to format"
      - name: "formatter"
        type: "string"
        required: false
        description: "Formatter to use"

  # Database Tools
  - id: "db-query"
    name: "Database Query"
    description: "Execute database query"
    category: "database"
    parameters:
      - name: "query"
        type: "string"
        required: true
        description: "SQL query to execute"
      - name: "connection"
        type: "string"
        required: false
        description: "Connection string"

  - id: "db-migrate"
    name: "Database Migration"
    description: "Run database migrations"
    category: "database"
    parameters:
      - name: "direction"
        type: "string"
        required: false
        description: "up or down"
      - name: "steps"
        type: "number"
        required: false
        description: "Number of steps"

  # Testing Tools
  - id: "test-run"
    name: "Run Tests"
    description: "Run test suite"
    category: "testing"
    parameters:
      - name: "framework"
        type: "string"
        required: false
        description: "Test framework (jest, vitest, etc)"
      - name: "pattern"
        type: "string"
        required: false
        description: "Test file pattern"

  - id: "test-generate"
    name: "Generate Tests"
    description: "Generate test cases"
    category: "testing"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to generate tests for"
      - name: "framework"
        type: "string"
        required: false
        description: "Test framework to use"

  - id: "test-coverage"
    name: "Code Coverage"
    description: "Generate code coverage report"
    category: "testing"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to analyze"

  # Diff Tools
  - id: "diff-compare"
    name: "Compare Files"
    description: "Compare two files or directories"
    category: "diff"
    parameters:
      - name: "source"
        type: "string"
        required: true
        description: "Source file or directory"
      - name: "target"
        type: "string"
        required: true
        description: "Target file or directory"

  # JSON Tools
  - id: "json-parse"
    name: "Parse JSON"
    description: "Parse JSON string"
    category: "json"
    parameters:
      - name: "content"
        type: "string"
        required: true
        description: "JSON string to parse"

  - id: "json-format"
    name: "Format JSON"
    description: "Format JSON string"
    category: "json"
    parameters:
      - name: "content"
        type: "string"
        required: true
        description: "JSON string to format"
      - name: "indent"
        type: "number"
        required: false
        description: "Indentation size"

  # CSV Tools
  - id: "csv-read"
    name: "Read CSV"
    description: "Read CSV file"
    category: "csv"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to CSV file"

  - id: "csv-write"
    name: "Write CSV"
    description: "Write CSV file"
    category: "csv"
    parameters:
      - name: "path"
        type: "string"
        required: true
        description: "Path to write CSV"
      - name: "data"
        type: "string"
        required: true
        description: "CSV data to write"

  # Markdown Tools
  - id: "md-render"
    name: "Render Markdown"
    description: "Render markdown to HTML"
    category: "markdown"
    parameters:
      - name: "content"
        type: "string"
        required: true
        description: "Markdown content to render"

  - id: "md-toc"
    name: "Generate TOC"
    description: "Generate table of contents"
    category: "markdown"
    parameters:
      - name: "content"
        type: "string"
        required: true
        description: "Markdown content"

  # Environment Tools
  - id: "env-read"
    name: "Read Environment"
    description: "Read environment variables"
    category: "env"
    parameters:
      - name: "keys"
        type: "array"
        required: false
        description: "Specific keys to read"

  - id: "env-set"
    name: "Set Environment"
    description: "Set environment variables"
    category: "env"
    parameters:
      - name: "key"
        type: "string"
        required: true
        description: "Variable name"
      - name: "value"
        type: "string"
        required: true
        description: "Variable value"

  # Secret Tools
  - id: "secrets-read"
    name: "Read Secrets"
    description: "Read secrets from vault"
    category: "secrets"
    parameters:
      - name: "keys"
        type: "array"
        required: true
        description: "Secret keys to read"

  - id: "secrets-write"
    name: "Write Secrets"
    description: "Write secrets to vault"
    category: "secrets"
    parameters:
      - name: "secrets"
        type: "object"
        required: true
        description: "Secrets to write"

  # Web Crawler Tools
  - id: "web-crawl"
    name: "Web Crawl"
    description: "Crawl webpage content"
    category: "web"
    parameters:
      - name: "url"
        type: "string"
        required: true
        description: "URL to crawl"
      - name: "selector"
        type: "string"
        required: false
        description: "CSS selector to extract"

  # Browser Automation Tools
  - id: "browser-open"
    name: "Open Browser"
    description: "Open a browser page"
    category: "browser"
    parameters:
      - name: "url"
        type: "string"
        required: true
        description: "URL to open"

  - id: "browser-click"
    name: "Click Element"
    description: "Click an element"
    category: "browser"
    parameters:
      - name: "selector"
        type: "string"
        required: true
        description: "CSS selector"

  - id: "browser-screenshot"
    name: "Take Screenshot"
    description: "Take a screenshot"
    category: "browser"
    parameters:
      - name: "path"
        type: "string"
        required: false
        description: "Path to save screenshot"

  # Thinking Tool
  - id: "thinking"
    name: "Thinking"
    description: "Complex reasoning and analysis"
    category: "thinking"
    parameters:
      - name: "prompt"
        type: "string"
        required: true
        description: "Reasoning prompt"

  # Monitoring Tools
  - id: "monitor-metrics"
    name: "Get Metrics"
    description: "Get system metrics"
    category: "monitoring"
    parameters:
      - name: "metrics"
        type: "array"
        required: false
        description: "Specific metrics to retrieve"

  - id: "monitor-alerts"
    name: "Get Alerts"
    description: "Get monitoring alerts"
    category: "monitoring"
    parameters:
      - name: "severity"
        type: "string"
        required: false
        description: "Filter by severity"
