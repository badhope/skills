version: "1.0.0"
testCases:
  - id: "tc-001"
    name: "Create Todo Application"
    description: "Test creating a simple React Todo application"
    intent: "new-project"
    input: "Create a simple React Todo application with TypeScript"
    expectedOutputs:
      - "Project structure with package.json"
      - "Main App component with Todo functionality"
      - "TypeScript configuration"
      - "Basic styling"
    expectedConfidence: 0.85
    maxDuration: 300000

  - id: "tc-002"
    name: "Implement Login Feature"
    description: "Test implementing a user login feature"
    intent: "feature-implementation"
    input: "Implement user login feature with email and password authentication"
    expectedOutputs:
      - "Login component"
      - "Authentication service"
      - "Form validation"
      - "Error handling"
    expectedConfidence: 0.80
    maxDuration: 240000

  - id: "tc-003"
    name: "Fix Null Pointer Bug"
    description: "Test bug fixing workflow"
    intent: "bug-fixing"
    input: "Fix the null pointer exception that occurs when clicking the submit button without filling the form"
    expectedOutputs:
      - "Root cause analysis document"
      - "Fixed code"
      - "Test verification"
      - "Regression test results"
    expectedConfidence: 0.90
    maxDuration: 180000

  - id: "tc-004"
    name: "Code Quality Review"
    description: "Test code review workflow"
    intent: "code-review"
    input: "Review the code in the src/components directory for quality and security issues"
    expectedOutputs:
      - "Initial review report"
      - "Security audit report"
      - "Final review recommendations"
    expectedConfidence: 0.85
    maxDuration: 120000

  - id: "tc-005"
    name: "Design E-commerce System"
    description: "Test technical design workflow"
    intent: "technical-design"
    input: "Create a technical design document for an e-commerce platform with product catalog, cart, and checkout"
    expectedOutputs:
      - "Requirements document"
      - "Architecture design"
      - "Detailed component design"
      - "Design validation report"
    expectedConfidence: 0.80
    maxDuration: 360000

  - id: "tc-006"
    name: "Deploy to Production"
    description: "Test deployment workflow"
    intent: "deployment"
    input: "Deploy the application to production environment with Docker containers"
    expectedOutputs:
      - "Dockerfile and docker-compose"
      - "Build artifacts"
      - "Deployment configuration"
      - "Verification report"
    expectedConfidence: 0.75
    maxDuration: 300000

  - id: "tc-007"
    name: "Security Vulnerability Audit"
    description: "Test security audit workflow"
    intent: "security-audit"
    input: "Perform a comprehensive security audit of the application codebase"
    expectedOutputs:
      - "Audit scope definition"
      - "Vulnerability scan results"
      - "Code security review findings"
      - "Security audit report"
    expectedConfidence: 0.85
    maxDuration: 240000

  - id: "tc-008"
    name: "Database Migration"
    description: "Test database task workflow"
    intent: "database-task"
    input: "Create database migrations for adding a new 'products' table with id, name, price, and description"
    expectedOutputs:
      - "Migration SQL scripts"
      - "Database schema definition"
      - "Migration test results"
    expectedConfidence: 0.80
    maxDuration: 180000

  - id: "tc-009"
    name: "Comprehensive Test Suite"
    description: "Test testing workflow"
    intent: "testing-task"
    input: "Create a comprehensive test suite covering unit, integration, and E2E tests"
    expectedOutputs:
      - "Test plan with coverage goals"
      - "Unit test files"
      - "Integration test files"
      - "Test execution results"
    expectedConfidence: 0.85
    maxDuration: 240000

  - id: "tc-010"
    name: "Refactor Legacy Code"
    description: "Test refactoring workflow"
    intent: "refactoring"
    input: "Refactor the legacy code in src/utils to improve maintainability and reduce complexity"
    expectedOutputs:
      - "Code analysis report"
      - "Refactoring plan"
      - "Refactored code files"
      - "Verification tests"
    expectedConfidence: 0.80
    maxDuration: 300000

  - id: "tc-011"
    name: "Generate API Documentation"
    description: "Test documentation workflow"
    intent: "documentation"
    input: "Generate comprehensive API documentation for all REST endpoints"
    expectedOutputs:
      - "Documentation plan"
      - "API reference documentation"
      - "Usage examples"
      - "Documentation quality review"
    expectedConfidence: 0.80
    maxDuration: 180000

  - id: "tc-012"
    name: "Code Performance Analysis"
    description: "Test analysis workflow"
    intent: "analysis"
    input: "Analyze the codebase for performance bottlenecks and optimization opportunities"
    expectedOutputs:
      - "Analysis plan"
      - "Performance profiling results"
      - "Bottleneck identification"
      - "Optimization recommendations"
    expectedConfidence: 0.75
    maxDuration: 180000

  - id: "tc-013"
    name: "Process and Transform Data"
    description: "Test data processing workflow"
    intent: "data-processing"
    input: "Process and transform CSV data from 'input' directory to normalized JSON format"
    expectedOutputs:
      - "Data analysis report"
      - "Transformation scripts"
      - "Processed JSON files"
      - "Data validation report"
    expectedConfidence: 0.75
    maxDuration: 240000

  - id: "tc-014"
    name: "Research Web Technologies"
    description: "Test search workflow"
    intent: "web-search"
    input: "Research and summarize the latest React state management libraries and their comparisons"
    expectedOutputs:
      - "Search plan with keywords"
      - "Research findings"
      - "Comparative analysis"
      - "Recommendation summary"
    expectedConfidence: 0.70
    maxDuration: 120000

  - id: "tc-015"
    name: "Containerize Application"
    description: "Test containerization workflow"
    intent: "containerization"
    input: "Containerize the entire application with Docker and docker-compose"
    expectedOutputs:
      - "Dockerfile for each service"
      - "docker-compose.yml"
      - "Container build logs"
      - "Local container test results"
    expectedConfidence: 0.80
    maxDuration: 240000

  - id: "tc-016"
    name: "Build REST API"
    description: "Test API development workflow"
    intent: "api-development"
    input: "Build a REST API with CRUD operations for managing todo items"
    expectedOutputs:
      - "API design specification"
      - "API implementation files"
      - "API test suite"
      - "API documentation"
    expectedConfidence: 0.80
    maxDuration: 300000

  - id: "tc-017"
    name: "Edge Case - Empty Input"
    description: "Test handling of empty/blank user input"
    intent: "bug-fixing"
    input: " "
    expectedOutputs:
      - "Input validation error message"
      - "Graceful handling without crash"
    expectedConfidence: 0.75
    maxDuration: 60000

  - id: "tc-018"
    name: "Edge Case - Invalid Input"
    description: "Test handling of invalid or unexpected inputs"
    intent: "bug-fixing"
    input: "!!&&@@#@$@$%^%^invalid##$$%%"
    expectedOutputs:
      - "Input sanitization"
      - "Appropriate error handling"
      - "User-friendly feedback"
    expectedConfidence: 0.75
    maxDuration: 60000

  - id: "tc-019"
    name: "Integration - Multiple Skills"
    description: "Test workflow that requires multiple skills"
    intent: "new-project"
    input: "Create a complete full-stack application with frontend, backend, database, and tests"
    expectedOutputs:
      - "Task planning from task-planner"
      - "Implementation from fullstack-engine"
      - "Testing from testing-master"
    expectedConfidence: 0.70
    maxDuration: 600000

  - id: "tc-020"
    name: "Multi-language - Chinese Request"
    description: "Test handling Chinese input"
    intent: "feature-implementation"
    input: "实现一个简单的待办事项列表功能，支持中文输入"
    expectedOutputs:
      - "Correct intent recognition"
      - "Appropriate response in English"
      - "Chinese support in implementation"
    expectedConfidence: 0.75
    maxDuration: 240000
